<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figma_Task</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main">
        <div class="content">
            <div class="left-content">
                <div class="header">
                    <h1>We'll find you the</h1> <br>
                    <h1>best policy.</h1>
                </div>
                <div class="para">
                    <p>Compare, buy and manage all your insurance polices in one place. Save up to 85% on premiums!</p>
                </div>
                <div class="feedback">
                    <div class="customer">
                        <img src="./Assets/Feedback/1.1.png" alt="">
                        <img src="./Assets/Feedback/1.2.png" alt="">
                        <img src="./Assets/Feedback/1.3.png" alt="">
                        <img src="./Assets/Feedback/1.4.png" alt="">
                        <img src="./Assets/Feedback/1.5.png" alt="">
                    </div>
                    <div class="customerCount">
                        <h1>10,000 +</h1>
                        <h1>Customers</h1>
                    </div>
                    <button class="quote">Get Quote</button>
                </div>
            </div>
            <div class="right-content">
                 <div class="curve"></div>
                    <div class="rotate-box">
                         <div class="img-container one"> 
                            <img src="./Assets/2.jpg" alt="">
                        </div>
                        <div class="img-container two">
                            <img src="./Assets/1.jpg" alt="">
                        </div>
                    </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
